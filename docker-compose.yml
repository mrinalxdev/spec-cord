networks:
  txnet:
    driver: bridge

volumes:
  etcd-data:
  shard-a-data:
  shard-b-data:
  shard-c-data:
  prometheus-data:

services:

  etcd:
    image: gcr.io/etcd-development/etcd:v3.5.13
    platform: linux/arm64
    container_name: etcd
    networks: [txnet]
    environment:
      ETCD_NAME: etcd0
      ETCD_DATA_DIR: /etcd-data
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd:2380
      ETCD_INITIAL_CLUSTER: etcd0=http://etcd:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: spec-coordinator-cluster
    volumes:
      - etcd-data:/etcd-data
    ports:
      - "2379:2379"
    healthcheck:
      test: ["CMD", "/usr/local/bin/etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 5s
      timeout: 5s
      retries: 10

  mysql-shard-a:
    image: mysql:8.0
    platform: linux/arm64
    container_name: mysql-shard-a
    networks: [txnet]
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shard_a
      MYSQL_USER: coordinator
      MYSQL_PASSWORD: coord_pass
    volumes:
      - shard-a-data:/var/lib/mysql
      - ./deploy/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    command: >
      --server-id=1
      --log-bin=mysql-bin
      --binlog-format=ROW
      --transaction-isolation=SERIALIZABLE
      --innodb-flush-log-at-trx-commit=1
      --sync-binlog=1
  
    healthcheck:
      test: ["CMD", "mysql", "-ucoordinator", "-pcoord_pass", "-h", "127.0.0.1", "shard_a", "-e", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  mysql-shard-b:
    image: mysql:8.0
    platform: linux/arm64
    container_name: mysql-shard-b
    networks: [txnet]
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shard_b
      MYSQL_USER: coordinator
      MYSQL_PASSWORD: coord_pass
    volumes:
      - shard-b-data:/var/lib/mysql
      - ./deploy/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3307:3306"
    command: >
      --server-id=2
      --log-bin=mysql-bin
      --binlog-format=ROW
      --transaction-isolation=SERIALIZABLE
      --innodb-flush-log-at-trx-commit=1
      --sync-binlog=1
    healthcheck:
      test: ["CMD", "mysql", "-ucoordinator", "-pcoord_pass", "-h", "127.0.0.1", "shard_b", "-e", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  mysql-shard-c:
    image: mysql:8.0
    platform: linux/arm64
    container_name: mysql-shard-c
    networks: [txnet]
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shard_c
      MYSQL_USER: coordinator
      MYSQL_PASSWORD: coord_pass
    volumes:
      - shard-c-data:/var/lib/mysql
      - ./deploy/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3308:3306"
    command: >
      --server-id=3
      --log-bin=mysql-bin
      --binlog-format=ROW
      --transaction-isolation=SERIALIZABLE
      --innodb-flush-log-at-trx-commit=1
      --sync-binlog=1
    healthcheck:
      test: ["CMD", "mysql", "-ucoordinator", "-pcoord_pass", "-h", "127.0.0.1", "shard_c", "-e", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  coordinator:
    build:
      context: ./coordinator
      dockerfile: Dockerfile
      args:
        TARGETARCH: arm64
    platform: linux/arm64
    container_name: coordinator
    networks: [txnet]
    depends_on:
      etcd:
        condition: service_healthy
      mysql-shard-a:
        condition: service_healthy
      mysql-shard-b:
        condition: service_healthy
      mysql-shard-c:
        condition: service_healthy
    environment:
      COORDINATOR_ID: "coordinator-1"
      ETCD_ENDPOINTS: "etcd:2379"
      SHARD_A_DSN: "coordinator:coord_pass@tcp(mysql-shard-a:3306)/shard_a"
      SHARD_B_DSN: "coordinator:coord_pass@tcp(mysql-shard-b:3306)/shard_b"
      SHARD_C_DSN: "coordinator:coord_pass@tcp(mysql-shard-c:3306)/shard_c"
      GRPC_LISTEN: ":9091"
      HTTP_LISTEN: ":8080"
      LOG_LEVEL: "info"
    ports:
      - "9091:9091"
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

  sysbench:
    image: ubuntu:22.04
    platform: linux/arm64
    container_name: sysbench
    networks: [txnet]
    depends_on:
      coordinator:
        condition: service_healthy
    volumes:
      - ./scripts/sysbench_prepare.sh:/prepare.sh:ro
      - ./scripts/sysbench_run.sh:/run.sh:ro
    entrypoint: ["/bin/bash", "-c", "apt-get update -qq && apt-get install -y -qq curl bc > /dev/null 2>&1 && sleep infinity"]

  prometheus:
    image: prom/prometheus:v2.51.0
    platform: linux/arm64
    container_name: prometheus
    networks: [txnet]
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  grafana:
    image: grafana/grafana:10.4.0
    platform: linux/arm64
    container_name: grafana
    networks: [txnet]
    depends_on: [prometheus]
    volumes:
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/coordinator.json
    ports:
      - "3000:3000"